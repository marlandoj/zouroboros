name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to avoid flakes from unvetted bun releases.
          # 1.3.13 has a parallel module-loader race that mis-reports
          # "Export named 'X' not found" during test parse. 1.3.12 is stable.
          # Bump intentionally after verifying the test runner is stable.
          bun-version: 1.3.12

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build (core must come first — other packages depend on it) ──────────

      - name: Build core
        run: pnpm --filter zouroboros-core build

      - name: Build memory
        run: pnpm --filter zouroboros-memory build

      - name: Build swarm
        run: pnpm --filter zouroboros-swarm build

      - name: Build workflow
        run: pnpm --filter zouroboros-workflow build

      - name: Build selfheal
        run: pnpm --filter zouroboros-selfheal build

      # ── Typecheck ────────────────────────────────────────────────────────────

      - name: Typecheck core
        run: pnpm --filter zouroboros-core typecheck

      - name: Typecheck memory
        run: pnpm --filter zouroboros-memory typecheck

      - name: Typecheck swarm
        run: pnpm --filter zouroboros-swarm typecheck

      - name: Typecheck selfheal
        run: pnpm --filter zouroboros-selfheal typecheck

      # ── Tests ────────────────────────────────────────────────────────────────

      - name: Test core (with coverage)
        run: pnpm --filter zouroboros-core test:coverage

      - name: Test memory
        run: pnpm --filter zouroboros-memory test

      - name: Test swarm
        run: pnpm --filter zouroboros-swarm test

      - name: Test selfheal
        run: pnpm --filter zouroboros-selfheal test

      # ── Artifacts ────────────────────────────────────────────────────────────

      - name: Upload core coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core
          path: packages/core/coverage/
          retention-days: 7
